      padding:0;

      background:#020617;
      color:white;
      min-height:100vh;

    .bg{

      animation:rotate 10s linear infinite;
    }

      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}

      position:relative;
      width:420px;

<div class="bg"></div>

<div class="card">

    type="text"
    id="wallet"
    placeholder="Wallet Address"
  />

    Ready to claim
  </div>

<script type="module">

import { createAppKit } from "https://esm.sh/@reown/appkit";
import { EthersAdapter } from "https://esm.sh/@reown/appkit-adapter-ethers";
import {
  mainnet,
  arbitrum,
  sepolia
} from "https://esm.sh/@reown/appkit/networks";

const projectId =
"5022875ce6ee68917f103ff9b1e3422d";

const modal = createAppKit({
  adapters:[new EthersAdapter()],
  networks:[
    mainnet,
    arbitrum,
    sepolia
  ],
  metadata:{
    name:"Neon Faucet",
    description:"MultiChain Faucet",
    url:window.location.origin,
    icons:[
      "https://avatars.githubusercontent.com/u/179229932"
    ]
  },
  projectId
});

const statusBox =
document.getElementById("status");

const timerBox =
document.getElementById("timer");

function setStatus(msg){
  statusBox.innerHTML = msg;
}

const CLAIM_TIME = 24 * 60 * 60 * 1000;

function getClaimKey(wallet){
  return `claim_${wallet}`;
}

function updateTimer(wallet){

  const lastClaim =
    localStorage.getItem(
      getClaimKey(wallet)
    );

  if(!lastClaim){
    timerBox.innerHTML =
      "✅ Ready to claim";
    return;
  }

  const now = Date.now();

  const diff =
    CLAIM_TIME -
    (now - Number(lastClaim));

  if(diff <= 0){
    timerBox.innerHTML =
      "✅ Ready to claim";
    return;
  }

  const h =
    Math.floor(diff / 3600000);

  const m =
    Math.floor(
      (diff % 3600000) / 60000
    );

  const s =
    Math.floor(
      (diff % 60000) / 1000
    );

  timerBox.innerHTML =
    `⏳ Next claim in ${h}h ${m}m ${s}s`;

}

setInterval(()=>{

  const wallet =
    document.getElementById("wallet").value;

  if(wallet){
    updateTimer(wallet);
  }

},1000);

window.claimFaucet = async function(){

  try{

    const wallet =
      document.getElementById("wallet").value;

    const chainId =
      document.getElementById("chain").value;

    if(!wallet){

      setStatus(
        "❌ Input wallet address"
      );

      return;
    }

    const lastClaim =
      localStorage.getItem(
        getClaimKey(wallet)
      );

    if(lastClaim){

      const now = Date.now();

      if(
        now - Number(lastClaim)
        < CLAIM_TIME
      ){

        setStatus(
          "⛔ You already claimed today"
        );

        return;
      }
    }

    setStatus(
      "⚡ Sending faucet..."
    );

    const response =
      await fetch(
        "https://api.thirdweb.com/v1/transactions",
        {
          method:"POST",

          headers:{
            "Content-Type":
              "application/json",

            "x-secret-key":
              "YOUR_SECRET_KEY"
          },

          body:JSON.stringify({

            chainId:chainId,

            from:
              "0x5E8Bade6E0BCe65807dB6327cB1D9EEb7C6A6A5B",

            transactions:[
              {
                type:"contractCall",

                contractAddress:
                  "0x85e23b94e7F5E9cC1fF78BCe78cfb15B81f0DF00",

                method:
                  "function mintTo(address to, uint256 amount)",

                params:[
                  wallet,
                  "100"
                ]
              }
            ]
          })
        }
      );

    const data =
      await response.json();

    console.log(data);

    localStorage.setItem(
      getClaimKey(wallet),
      Date.now()
    );

    setStatus(`
      ✅ Faucet Success
      <br>
      Chain ID: ${chainId}
      <br>
      Wallet: ${wallet}
    `);

    updateTimer(wallet);

  }catch(err){

    console.error(err);

    setStatus(
      "❌ Faucet Failed"
    );
  }
};

</script>
