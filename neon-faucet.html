<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon MultiChain Faucet</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#020617;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    .bg{
      position:absolute;
      width:600px;
      height:600px;
      background:linear-gradient(
        45deg,
        #00f0ff,
        #8b5cf6,
        #00f0ff
      );
      filter:blur(140px);
      opacity:.25;
      animation:rotate 10s linear infinite;
    }

    @keyframes rotate{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

    .card{
      position:relative;
      width:420px;
      background:rgba(15,23,42,.8);
      border:1px solid rgba(255,255,255,.1);
      backdrop-filter:blur(20px);
      padding:30px;
      border-radius:25px;
      box-shadow:
        0 0 30px rgba(0,255,255,.15),
        0 0 60px rgba(139,92,246,.15);
      z-index:10;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:28px;
      background:linear-gradient(
        90deg,
        #00f0ff,
        #8b5cf6
      );
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    input,select{
      width:100%;
      padding:14px;
      margin-top:12px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#0f172a;
      color:white;
      border:1px solid rgba(255,255,255,.08);
    }

    button{
      width:100%;
      padding:14px;
      margin-top:15px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      color:white;
      background:linear-gradient(
        90deg,
        #06b6d4,
        #8b5cf6
      );
      transition:.3s;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:
        0 0 20px #06b6d4,
        0 0 40px #8b5cf6;
    }

    #status{
      margin-top:18px;
      padding:14px;
      border-radius:12px;
      background:#0f172a;
      font-size:14px;
      line-height:1.6;
      min-height:70px;
      border:1px solid rgba(255,255,255,.08);
    }

    .timer{
      margin-top:10px;
      text-align:center;
      color:#38bdf8;
      font-size:14px;
    }

    .chain{
      margin-top:10px;
      font-size:13px;
      color:#94a3b8;
    }

  </style>
</head>
<body>

<div class="bg"></div>

<div class="card">

  <h1>⚡ Neon Faucet</h1>

  <appkit-button></appkit-button>

  <input
    type="text"
    id="wallet"
    placeholder="Wallet Address"
  />

  <select id="chain">
    <option value="84532">Base Sepolia</option>
    <option value="421614">Arbitrum Sepolia</option>
    <option value="11155111">Ethereum Sepolia</option>
  </select>

  <button onclick="claimFaucet()">
    Claim Faucet
  </button>

  <div class="timer" id="timer">
    Ready to claim
  </div>

  <div id="status">
    Waiting...
  </div>

</div>

<script type="module">

import { createAppKit } from "https://esm.sh/@reown/appkit";
import { EthersAdapter } from "https://esm.sh/@reown/appkit-adapter-ethers";
import {
  mainnet,
  arbitrum,
  sepolia
} from "https://esm.sh/@reown/appkit/networks";

const projectId =
"5022875ce6ee68917f103ff9b1e3422d";

const modal = createAppKit({
  adapters:[new EthersAdapter()],
  networks:[
    mainnet,
    arbitrum,
    sepolia
  ],
  metadata:{
    name:"Neon Faucet",
    description:"MultiChain Faucet",
    url:window.location.origin,
    icons:[
      "https://avatars.githubusercontent.com/u/179229932"
    ]
  },
  projectId
});

const statusBox =
document.getElementById("status");

const timerBox =
document.getElementById("timer");

function setStatus(msg){
  statusBox.innerHTML = msg;
}

const CLAIM_TIME = 24 * 60 * 60 * 1000;

function getClaimKey(wallet){
  return `claim_${wallet}`;
}

function updateTimer(wallet){

  const lastClaim =
    localStorage.getItem(
      getClaimKey(wallet)
    );

  if(!lastClaim){
    timerBox.innerHTML =
      "✅ Ready to claim";
    return;
  }

  const now = Date.now();

  const diff =
    CLAIM_TIME -
    (now - Number(lastClaim));

  if(diff <= 0){
    timerBox.innerHTML =
      "✅ Ready to claim";
    return;
  }

  const h =
    Math.floor(diff / 3600000);

  const m =
    Math.floor(
      (diff % 3600000) / 60000
    );

  const s =
    Math.floor(
      (diff % 60000) / 1000
    );

  timerBox.innerHTML =
    `⏳ Next claim in ${h}h ${m}m ${s}s`;

}

setInterval(()=>{

  const wallet =
    document.getElementById("wallet").value;

  if(wallet){
    updateTimer(wallet);
  }

},1000);

window.claimFaucet = async function(){

  try{

    const wallet =
      document.getElementById("wallet").value;

    const chainId =
      document.getElementById("chain").value;

    if(!wallet){

      setStatus(
        "❌ Input wallet address"
      );

      return;
    }

    const lastClaim =
      localStorage.getItem(
        getClaimKey(wallet)
      );

    if(lastClaim){

      const now = Date.now();

      if(
        now - Number(lastClaim)
        < CLAIM_TIME
      ){

        setStatus(
          "⛔ You already claimed today"
        );

        return;
      }
    }

    setStatus(
      "⚡ Sending faucet..."
    );

    const response =
      await fetch(
        "https://api.thirdweb.com/v1/transactions",
        {
          method:"POST",

          headers:{
            "Content-Type":
              "application/json",

            "x-secret-key":
              "YOUR_SECRET_KEY"
          },

          body:JSON.stringify({

            chainId:chainId,

            from:
              "0x5E8Bade6E0BCe65807dB6327cB1D9EEb7C6A6A5B",

            transactions:[
              {
                type:"contractCall",

                contractAddress:
                  "0x85e23b94e7F5E9cC1fF78BCe78cfb15B81f0DF00",

                method:
                  "function mintTo(address to, uint256 amount)",

                params:[
                  wallet,
                  "100"
                ]
              }
            ]
          })
        }
      );

    const data =
      await response.json();

    console.log(data);

    localStorage.setItem(
      getClaimKey(wallet),
      Date.now()
    );

    setStatus(`
      ✅ Faucet Success
      <br>
      Chain ID: ${chainId}
      <br>
      Wallet: ${wallet}
    `);

    updateTimer(wallet);

  }catch(err){

    console.error(err);

    setStatus(
      "❌ Faucet Failed"
    );
  }
};

</script>

</body>
</html>
