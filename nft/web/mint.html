<!DOCTYPE html>
<html>
<head>
  <title>AWDEV NFT Mint</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>
<script src="https://whellcolor.github.io/js/deploy.js"></script>
<script src="https://whellcolor.github.io/js/multi-rpc.js"></script>
<script src="https://whellcolor.github.io/js/fetch.js"></script>
<script src="https://whellcolor.github.io/dapp/rpc.js"></script>
<script src="https://unpkg.com/thirdweb/dist/scripts/bridge-widget.js"></script>
<script src="/rpc.js"></script>
<script src="https://whellcolor.github.io/dapp/js/rpc.js"></script>


</head>
<body>

<h2>Mint AWDEV NFT</h2>
<iframe
  src="https://thirdweb.com/bridge/buy-widget?chain=56&amount=0.02&receiver=0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88&title=NFT&image=https%3A%2F%2Fwhellcolor.github.io%2Fdapp%2FawdevNFT.jpg&buttonLabel=LOG"
  height="850px"
  width="100%"
  style="border: 0;"
/>

  
<button onclick="mintNFT()">Mint NFT</button>

<script>

const contractAddress = "YOUR_CONTRACT_ADDRESS";

const abi = [
  "function mintNFT(address to, string memory tokenURI) public returns (uint256)"
];

async function mintNFT() {

  if (!window.ethereum) {
    alert("Install MetaMask");
    return;
  }

  await window.ethereum.request({
    method: 'eth_requestAccounts'
  });

  const provider = new ethers.BrowserProvider(window.ethereum);

  const signer = await provider.getSigner();

  const contract = new ethers.Contract(
    contractAddress,
    abi,
    signer
  );

  const tx = await contract.mintNFT(
    "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",
    "ipfs://REPLACE_METADATA_CID/1.json"
  );

  await tx.wait();

  alert("NFT Minted");
}

</script>

</body>
</html>
