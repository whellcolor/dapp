


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Neon Full DEX</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#020617;
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

.bg{
  position:fixed;
  width:700px;
  height:700px;
  background:
  linear-gradient(
    45deg,
    #00f0ff,
    #8b5cf6,
    #00f0ff
  );

  filter:blur(160px);
  opacity:.15;
  animation:spin 12s linear infinite;
}

@keyframes spin{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

.container{
  position:relative;
  z-index:2;
  max-width:1200px;
  margin:auto;
  padding:30px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.logo{
  font-size:32px;
  font-weight:bold;

  background:
  linear-gradient(
    90deg,
    #00f0ff,
    #8b5cf6
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.connect-btn{
  padding:14px 22px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:white;
  font-weight:bold;

  background:
  linear-gradient(
    90deg,
    #06b6d4,
    #8b5cf6
  );
}

.grid{
  display:grid;
  grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

  gap:25px;
}

.card{
  background:
  rgba(15,23,42,.75);

  border:1px solid rgba(255,255,255,.08);

  border-radius:24px;

  padding:24px;

  backdrop-filter:blur(20px);

  box-shadow:
  0 0 30px rgba(0,255,255,.08);
}

.card h2{
  margin-bottom:20px;
}

input,
select{
  width:100%;
  padding:14px;
  border:none;
  outline:none;
  border-radius:14px;
  margin-top:12px;

  background:#0f172a;
  color:white;

  border:1px solid rgba(255,255,255,.06);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  margin-top:15px;

  font-weight:bold;
  color:white;

  background:
  linear-gradient(
    90deg,
    #06b6d4,
    #8b5cf6
  );

  transition:.3s;
}

button:hover{
  transform:translateY(-2px);

  box-shadow:
  0 0 20px #06b6d4,
  0 0 40px #8b5cf6;
}

.token-list{
  margin-top:20px;
}

.token{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:12px;
  margin-top:10px;

  background:#0f172a;

  border-radius:12px;
}

.history{
  max-height:250px;
  overflow:auto;
}

.history-item{
  padding:12px;
  margin-top:10px;
  border-radius:12px;

  background:#0f172a;
}

.leaderboard-item{
  display:flex;
  justify-content:space-between;

  margin-top:12px;
  padding:12px;

  background:#0f172a;
  border-radius:12px;
}

.status{
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  background:#0f172a;
  font-size:14px;
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;

  background:#111827;

  color:#22d3ee;

  font-size:12px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="header">

<div class="logo">
⚡ Neon DEX
</div>

<button
class="connect-btn"
onclick="connectWallet()"
id="walletBtn"
>
Connect Wallet
</button>

</div>

<div class="grid">

<!-- SWAP -->

<div class="card">

<h2>🔄 Swap</h2>

<select id="fromToken">
  <option>ETH</option>
  <option>USDT</option>
  <option>USDC</option>
</select>

<select id="toToken">
  <option>USDT</option>
  <option>ETH</option>
  <option>USDC</option>
</select>

<input
type="number"
id="swapAmount"
placeholder="Amount"
/>

<button onclick="swapToken()">
Swap Now
</button>

<div
class="status"
id="swapStatus"
>
Ready
</div>

</div>

<!-- LIQUIDITY -->

<div class="card">

<h2>💧 Add Liquidity</h2>

<input
type="number"
id="lpEth"
placeholder="ETH Amount"
/>

<input
type="number"
id="lpUsdt"
placeholder="USDT Amount"
/>

<button onclick="addLiquidity()">
Add Liquidity
</button>

<div
class="status"
id="lpStatus"
>
Ready
</div>

</div>

<!-- FARMING -->

<div class="card">

<h2>🌾 Farming</h2>

<input
type="number"
id="stakeAmount"
placeholder="LP Token Amount"
/>

<button onclick="stakeLP()">
Stake LP
</button>

<button onclick="claimReward()">
Claim Reward
</button>

<div
class="status"
id="farmStatus"
>
Ready
</div>

</div>

<!-- NFT -->

<div class="card">

<h2>🖼 NFT Reward</h2>

<button onclick="claimNFT()">
Claim NFT
</button>

<div class="token-list">

<div class="token">
<span>NFT Earned</span>
<span id="nftCount">
0
</span>
</div>

</div>

</div>

<!-- XP -->

<div class="card">

<h2>⭐ XP System</h2>

<div class="token-list">

<div class="token">
<span>Total XP</span>
<span id="xp">
0
</span>
</div>

<div class="token">
<span>Total Swaps</span>
<span id="swaps">
0
</span>
</div>

<div class="token">
<span>Liquidity</span>
<span id="liq">
0
</span>
</div>

</div>

</div>

<!-- HISTORY -->

<div class="card">

<h2>📜 Activity</h2>

<div
class="history"
id="history"
></div>

</div>

<!-- LEADERBOARD -->

<div class="card">

<h2>🏆 Leaderboard</h2>

<div id="leaderboard"></div>

</div>

</div>

</div>

<script>

let provider;
let signer;
let wallet;

let xp = 0;
let swaps = 0;
let liquidity = 0;
let nftCount = 0;

async function connectWallet(){

  if(!window.ethereum){

    alert("Install MetaMask");

    return;
  }

  provider =
  new ethers.BrowserProvider(
    window.ethereum
  );

  await provider.send(
    "eth_requestAccounts",
    []
  );

  signer =
  await provider.getSigner();

  wallet =
  await signer.getAddress();

  document
  .getElementById("walletBtn")
  .innerHTML =
  wallet.slice(0,6)
  + "..."
  + wallet.slice(-4);

  addHistory(
    "Wallet Connected"
  );
}

function addHistory(text){

  const div =
  document.createElement("div");

  div.className =
  "history-item";

  div.innerHTML = `
    ${new Date()
      .toLocaleTimeString()}
    <br>
    ${text}
  `;

  document
  .getElementById("history")
  .prepend(div);
}

function updateXP(){

  document
  .getElementById("xp")
  .innerHTML = xp;

  document
  .getElementById("swaps")
  .innerHTML = swaps;

  document
  .getElementById("liq")
  .innerHTML = liquidity;

  document
  .getElementById("nftCount")
  .innerHTML = nftCount;

  saveLeaderboard();
}

function saveLeaderboard(){

  if(!wallet) return;

  let board =
  JSON.parse(
    localStorage.getItem(
      "leaderboard"
    ) || "[]"
  );

  const exists =
  board.find(
    x=>x.wallet===wallet
  );

  if(exists){

    exists.xp = xp;

  }else{

    board.push({
      wallet,
      xp
    });
  }

  board.sort(
    (a,b)=>b.xp-a.xp
  );

  localStorage.setItem(
    "leaderboard",
    JSON.stringify(board)
  );

  renderLeaderboard();
}

function renderLeaderboard(){

  const board =
  JSON.parse(
    localStorage.getItem(
      "leaderboard"
    ) || "[]"
  );

  document
  .getElementById(
    "leaderboard"
  )
  .innerHTML = board
  .slice(0,10)
  .map((x,i)=>`

    <div class="leaderboard-item">

      <span>
        #${i+1}
        ${x.wallet.slice(0,6)}
      </span>

      <span>
        ${x.xp} XP
      </span>

    </div>

  `)
  .join("");
}

renderLeaderboard();

async function swapToken(){

  const amount =
  document
  .getElementById(
    "swapAmount"
  ).value;

  document
  .getElementById(
    "swapStatus"
  ).innerHTML =
  "Swapping...";

  await new Promise(
    r=>setTimeout(r,1500)
  );

  swaps++;
  xp += 15;

  updateXP();

  document
  .getElementById(
    "swapStatus"
  ).innerHTML =
  "✅ Swap Success";

  addHistory(
    `Swap ${amount} token`
  );
}

async function addLiquidity(){

  const eth =
  document
  .getElementById(
    "lpEth"
  ).value;

  const usdt =
  document
  .getElementById(
    "lpUsdt"
  ).value;

  document
  .getElementById(
    "lpStatus"
  ).innerHTML =
  "Adding liquidity...";

  await new Promise(
    r=>setTimeout(r,1500)
  );

  liquidity += Number(eth);

  xp += 25;

  updateXP();

  document
  .getElementById(
    "lpStatus"
  ).innerHTML =
  "✅ LP Added";

  addHistory(
    `Add LP ${eth} ETH + ${usdt} USDT`
  );
}

async function stakeLP(){

  document
  .getElementById(
    "farmStatus"
  ).innerHTML =
  "Staking...";

  await new Promise(
    r=>setTimeout(r,1500)
  );

  xp += 20;

  updateXP();

  document
  .getElementById(
    "farmStatus"
  ).innerHTML =
  "✅ LP Staked";

  addHistory(
    "LP Staked"
  );
}

async function claimReward(){

  document
  .getElementById(
    "farmStatus"
  ).innerHTML =
  "Claiming reward...";

  await new Promise(
    r=>setTimeout(r,1500)
  );

  xp += 30;

  updateXP();

  document
  .getElementById(
    "farmStatus"
  ).innerHTML =
  "✅ Reward Claimed";

  addHistory(
    "Farm reward claimed"
  );
}

async function claimNFT(){

  nftCount++;

  xp += 50;

  updateXP();

  addHistory(
    "NFT Reward Claimed"
  );
}

</script>
