<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>awdevNFT dApp</title>

  <link rel="stylesheet" href="style.css" />

  <!-- ethers.js -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>

  <style>
    body{
      background:#0f172a;
      color:white;
      font-family:Arial,sans-serif;
      padding:30px;
    }

    .card,.box{
      background:#111827;
      padding:25px;
      border-radius:16px;
      margin-bottom:20px;
      border:1px solid #334155;
    }

    button{
      padding:12px 18px;
      margin:6px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#2563eb;
      color:white;
      font-weight:bold;
    }

    button:hover{
      background:#1d4ed8;
    }

    #wallet{
      margin:15px 0;
      color:#22c55e;
      word-break:break-all;
    }

    pre{
      background:#020617;
      padding:15px;
      border-radius:10px;
      overflow:auto;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>awdevNFT dApp</h1>
    <p>Web3 Production Ready</p>

    <div id="wallet">Wallet not connected</div>

    <button onclick="connectWallet()">
      Connect Wallet
    </button>

    <button onclick="mintNFT()">
      Mint NFT
    </button>

    <button onclick="claimReward()">
      Claim Reward
    </button>
  </div>

  <div class="box">
    <h2>Ethereum Holesky RPC</h2>

    <p><b>us-central1 RPC</b></p>


    <button onclick="testRPC()">
      Test RPC Connection
    </button>

    <div id="rpcStatus"></div>
  </div>

  <div class="box">
    <h2>NFT Actions</h2>

    <button onclick="mint()">
      Mint NFT
    </button>

    <button onclick="stake()">
      Stake NFT #0
    </button>

    <button onclick="unstake()">
      Unstake NFT #0
    </button>
  </div>

  <script>
    let provider;
    let signer;

    // =========================
    // HOLESKY RPC CONFIG
    // =========================

    const HOLESKY_RPC =
      "https://blockchain.googleapis.com/v1/projects/cogent-density-472314-r7/locations/asia-east1/endpoints/ethereum-holesky/rpc?key=AIzaSyBjuvEx3eIY32c5nbZAcMd8MuU-OpLIt2Q";

    const HOLESKY_CHAIN_ID = "0x4268"; // 17000

    // =========================
    // CONTRACT CONFIG
    // =========================

    const nftAddress =
      "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88";

    const stakingAddress =
      "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88";

    const nftAbi = [
      "function mint(address to, string uri)"
    ];

    const stakeAbi = [
      "function stake(uint256 tokenId)",
      "function unstake(uint256 tokenId)"
    ];

    // =========================
    // CONNECT WALLET
    // =========================

    async function connectWallet() {

      if (!window.ethereum) {
        alert("MetaMask not installed");
        return;
      }

      try {

        provider = new ethers.BrowserProvider(window.ethereum);

        await provider.send(
          "eth_requestAccounts",
          []
        );

        signer = await provider.getSigner();

        // Switch to Holesky
        await switchToHolesky();

        const address =
          await signer.getAddress();

        document.getElementById(
          "wallet"
        ).innerHTML =
          "Connected: " + address;

        console.log("Connected:", address);

      } catch (err) {
        console.error(err);
      }
    }

    // =========================
    // SWITCH NETWORK
    // =========================

    async function switchToHolesky() {

      try {

        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [
            {
              chainId: HOLESKY_CHAIN_ID
            }
          ]
        });

      } catch (switchError) {

        // Add chain if not exists
        if (switchError.code === 4902) {

          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [
              {
                chainId: HOLESKY_CHAIN_ID,
                chainName: "Ethereum Holesky",
                nativeCurrency: {
                  name: "Ethereum",
                  symbol: "ETH",
                  decimals: 18
                },
                rpcUrls: [
                  HOLESKY_RPC
                ],
                blockExplorerUrls: [
                  "https://holesky.etherscan.io"
                ]
              }
            ]
          });

        }
      }
    }

    // =========================
    // TEST RPC
    // =========================

    async function testRPC() {

      try {

        const rpcProvider =
          new ethers.JsonRpcProvider(
            HOLESKY_RPC
          );

        const block =
          await rpcProvider.getBlockNumber();

        document.getElementById(
          "rpcStatus"
        ).innerHTML =
          "RPC Connected ✅ Latest Block: " + block;

      } catch (err) {

        console.error(err);

        document.getElementById(
          "rpcStatus"
        ).innerHTML =
          "RPC Failed ❌";

      }
    }

    // =========================
    // MINT NFT
    // =========================

    async function mintNFT() {

      if (!signer) {
        alert("Connect wallet first");
        return;
      }

      try {

        const nft =
          new ethers.Contract(
            nftAddress,
            nftAbi,
            signer
          );

        const tx = await nft.mint(
          await signer.getAddress(),
          "ipfs://YOUR_METADATA"
        );

        await tx.wait();

        alert("NFT Minted ✅");

      } catch (err) {

        console.error(err);
        alert("Mint failed");

      }
    }

    // alias
    async function mint() {
      await mintNFT();
    }

    // =========================
    // STAKE NFT
    // =========================

    async function stake() {

      if (!signer) {
        alert("Connect wallet first");
        return;
      }

      try {

        const contract =
          new ethers.Contract(
            stakingAddress,
            stakeAbi,
            signer
          );

        const tx =
          await contract.stake(0);

        await tx.wait();

        alert("NFT Staked ✅");

      } catch (err) {

        console.error(err);
        alert("Stake failed");

      }
    }

    // =========================
    // UNSTAKE NFT
    // =========================

    async function unstake() {

      if (!signer) {
        alert("Connect wallet first");
        return;
      }

      try {

        const contract =
          new ethers.Contract(
            stakingAddress,
            stakeAbi,
            signer
          );

        const tx =
          await contract.unstake(0);

        await tx.wait();

        alert("NFT Unstaked ✅");

      } catch (err) {

        console.error(err);
        alert("Unstake failed");

      }
    }

    // =========================
    // CLAIM REWARD
    // =========================

    async function claimReward() {

      alert("Reward claimed ✅");

    }
  </script>

// =========================
// THIRDWEB CLIENT
// =========================

const client = createThirdwebClient({
  clientId: "YOUR_THIRDWEB_CLIENT_ID",
});

// =========================
// APP
// =========================

function WidgetsApp() {

  return React.createElement(
    "div",

        gap: "20px",

    // =========================

    // =========================

    React.createElement(BridgeWidget, {
      client: client,

      swap: {
        prefill: {
          buyToken: {
            chainId: 8453,

              "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",
          },

          sellToken: {
            chainId: 137,
          },
        },
      },

      buy: {
        amount: "100",
        chainId: 8453,
        tokenAddress:
          "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",
        buttonLabel: "Buy USDC",
      },
    }),

    // =========================
    // CHECKOUT WIDGET
    // =========================

    React.createElement(CheckoutWidget, {
      client: client,

      chain: arbitrum,

      amount: "0.01",

      seller: "0x123...abc",

      supportedTokens: {
        8453: [
          {
            address:
              "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",

            name: "USDC",
            symbol: "USDC",
          },
        ],
      },
    }),

    // =========================
    // SWAP WIDGET
    // =========================

    React.createElement(SwapWidget, {
      client: client,

      prefill: {
        buyToken: {
          chainId: 8453,

          tokenAddress:
            "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",
        },

        sellToken: {
          chainId: 137,
        },
      },
    }),

    // =========================
    // TRANSACTION WIDGET SIMPLE
    // =========================

    React.createElement(TransactionWidget, {
      client: client,

      transaction: prepareTransaction({
        to: "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",

        chain: ethereum,

        client: client,
      }),

      amount: "0.1",
    }),

    // =========================
    // TRANSACTION WIDGET ADVANCED
    // =========================

    React.createElement(TransactionWidget, {
      client: client,

      transaction: prepareTransaction({
        to: "0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",

        chain: ethereum,

        client: client,

        value: toUnits("0.001", 18),
      }),

      connectOptions: {
        connectModal: {
          size: "compact",
          title: "Sign in",
        },
      },
    })
  );
}


// =========================
// RENDER
// =========================

const rootDiv = document.createElement("div");

rootDiv.id = "thirdweb-widgets";

document.body.appendChild(rootDiv);

const root = ReactDOM.createRoot(rootDiv);

root.render(
  React.createElement(WidgetsApp)
);

</script>
